<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <!-- Quan trọng: làm cho trang hiển thị đúng trên mobile -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#6C63FF" />

  <!-- Khai báo PWA -->
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />

  <link rel="stylesheet" href="css/style.css" />
  <title>Chi Tiêu</title>
</head>
<body>

  <!-- MÀN HÌNH KHÓA: hiện khi mở app, yêu cầu xác thực -->
  <div id="lock-screen" class="screen active">
    <div class="lock-content">
      <div class="app-icon">💰</div>
      <h1>Chi Tiêu</h1>
      <p>Nhấn để mở khóa</p>
      <button id="unlock-btn" class="btn-primary">🔒 Mở khóa</button>
    </div>
  </div>

  <!-- MÀN HÌNH CHÍNH -->
  <div id="main-screen" class="screen">

    <!-- THANH ĐIỀU HƯỚNG dưới cùng -->
    <nav class="bottom-nav">
      <button class="nav-btn active" data-tab="today">
        <span>📋</span><small>Hôm nay</small>
      </button>
      <button class="nav-btn" data-tab="summary">
        <span>📊</span><small>Tổng kết</small>
      </button>
      <button class="nav-btn" data-tab="history">
        <span>🗓️</span><small>Lịch sử</small>
      </button>
    </nav>

    <!-- TAB: HÔM NAY -->
    <div id="tab-today" class="tab-content active">
      <header class="page-header">
        <h2>Hôm nay</h2>
        <span id="today-date" class="date-label"></span>
      </header>

      <!-- Tổng hôm nay -->
      <div class="total-card">
        <p class="total-label">Tổng chi hôm nay</p>
        <p class="total-amount" id="today-total">0 ₫</p>
      </div>

      <!-- Danh sách khoản chi hôm nay -->
      <div class="expense-list" id="today-list">
        <p class="empty-state">Chưa có khoản chi nào 👆</p>
      </div>

      <!-- Nút thêm -->
      <button class="fab" id="add-btn">＋</button>
    </div>

    <!-- TAB: TỔNG KẾT -->
    <div id="tab-summary" class="tab-content">
      <header class="page-header">
        <h2>Tổng kết</h2>
      </header>
      <div class="summary-grid">
        <div class="summary-card">
          <p class="summary-label">Tuần này</p>
          <p class="summary-amount" id="week-total">0 ₫</p>
        </div>
        <div class="summary-card">
          <p class="summary-label">Tháng này</p>
          <p class="summary-amount" id="month-total">0 ₫</p>
        </div>
        <div class="summary-card wide">
          <p class="summary-label">Năm nay</p>
          <p class="summary-amount" id="year-total">0 ₫</p>
        </div>
      </div>
    </div>

    <!-- TAB: LỊCH SỬ -->
    <div id="tab-history" class="tab-content">
      <header class="page-header">
        <h2>Lịch sử</h2>
      </header>
      <div class="expense-list" id="history-list">
        <p class="empty-state">Chưa có dữ liệu</p>
      </div>
    </div>

  </div><!-- end main-screen -->

  <!-- MODAL: THÊM / SỬA KHOẢN CHI -->
  <div id="modal-overlay" class="modal-overlay hidden">
    <div class="modal">
      <div class="modal-header">
        <h3 id="modal-title">Thêm khoản chi</h3>
        <button id="modal-close">✕</button>
      </div>

      <!-- Nhập số tiền -->
      <label>Số tiền (₫)</label>
      <input type="number" id="input-amount" placeholder="VD: 35000"
             inputmode="numeric" min="0" />

      <!-- Chọn danh mục -->
      <label>Danh mục</label>
      <div class="category-picker" id="category-picker">
        <button class="cat-btn active" data-cat="food">🍜 Ăn uống</button>
        <button class="cat-btn" data-cat="transport">🛵 Di chuyển</button>
        <button class="cat-btn" data-cat="shopping">🛍️ Mua sắm</button>
        <button class="cat-btn" data-cat="entertainment">🎮 Giải trí</button>
        <button class="cat-btn" data-cat="other">📦 Khác</button>
      </div>

      <!-- Ghi chú -->
      <label>Ghi chú (tuỳ chọn)</label>
      <input type="text" id="input-note" placeholder="VD: Cơm trưa văn phòng"
             maxlength="100" />

      <button class="btn-primary" id="save-btn">Lưu</button>
    </div>
  </div>

  <!-- Load scripts -->
  <script src="js/db.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
